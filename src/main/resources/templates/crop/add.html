<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Crop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
  <h2>Add New Crop</h2>
  <form th:action="@{/crop/save}" th:object="${crop}" method="post">
    <div class="mb-3">
      <label>Name:</label>
      <input type="text" th:field="*{name}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>Notes:</label>
      <textarea th:field="*{notes}" class="form-control"></textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="/crop/list" class="btn btn-secondary">Cancel</a>
  </form>
  <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</body>
</html>
