<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Crops List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
  <h2>Crop List</h2>
  <a href="/crop/add" class="btn btn-success mb-3">Add New Crop</a>

  <table class="table table-bordered table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Notes</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="crop : ${crops}">
        <td th:text="${crop.cropId}"></td>
        <td th:text="${crop.name}"></td>
        <td th:text="${crop.notes}"></td>
        <td>
          <a th:href="@{'/crop/edit/' + ${crop.cropId}}" class="btn btn-primary btn-sm">Edit</a>
          <a th:href="@{'/crop/delete/' + ${crop.cropId}}" class="btn btn-danger btn-sm">Delete</a>
        </td>
      </tr>
    </tbody>
  </table>
  <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</body>
</html>
