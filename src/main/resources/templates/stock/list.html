<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Pesticide Stock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container mt-5">

  <h2 class="text-center text-success mb-4">Pesticide Stock Overview</h2>

  <!-- 🔴 Low Stock Alert Section -->
  <div th:if="${lowStockPesticides != null and #lists.size(lowStockPesticides) > 0}">
    <div class="alert alert-danger fw-bold">
      <i class="bi bi-exclamation-triangle"></i> Low Stock Alert!
    </div>
    <table class="table table-bordered table-striped table-sm mb-5">
      <thead class="table-danger">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Company</th>
          <th>Quantity</th>
          <th>Unit</th>
          <th>Purchase Date</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${lowStockPesticides}">
          <td th:text="${p.pesticideId}"></td>
          <td th:text="${p.name}"></td>
          <td th:text="${p.company}"></td>
          <td th:text="${p.qty}"></td>
          <td th:text="${p.unit}"></td>
          <td th:text="${p.purchaseDate}"></td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ✅ Full Stock List -->
  <h4 class="mb-3 text-primary">All Pesticides in Stock</h4>
  <table class="table table-bordered table-hover table-sm">
    <thead class="table-success">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Company</th>
        <th>Qty</th>
        <th>Unit</th>
        <th>Price</th>
        <th>Purchase Date</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="p : ${allPesticides}">
        <td th:text="${p.pesticideId}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.company}"></td>
        <td th:text="${p.qty}"></td>
        <td th:text="${p.unit}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.purchaseDate}"></td>
        <td th:text="${p.notes}"></td>
      </tr>
    </tbody>
  </table>

  <div class="text-center mt-4">
    <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
