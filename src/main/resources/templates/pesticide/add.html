<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Pesticide</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-5" style="max-width: 600px;">
  <h4>Add Pesticide</h4>

  <form th:action="@{/pesticide/add}" method="post">
    <div class="mb-3">
      <label>Name</label>
      <input type="text" name="name" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label>Company</label>
      <input type="text" name="company" class="form-control"/>
    </div>
    <div class="mb-3">
      <label>Purchase Date</label>
      <input type="date" name="purchaseDate" class="form-control"/>
    </div>
    <div class="mb-3">
      <label>Price</label>
      <input type="number" step="0.01" name="price" class="form-control"/>
    </div>
    <div class="mb-3">
      <label>Quantity</label>
      <input type="number" step="0.01" name="qty" class="form-control"/>
    </div>
    <div class="mb-3">
      <label>Unit</label>
      <select name="unit" class="form-select">
        <option value="ml">ml</option>
        <option value="g">g</option>
        <option value="kg">kg</option>
        <option value="L">L</option>
      </select>
    </div>
    <div class="mb-3">
      <label>Notes</label>
      <textarea name="notes" class="form-control"></textarea>
    </div>
    <button class="btn btn-success w-100">Save</button>
  </form>

  <a href="/pesticide/list" class="btn btn-secondary mt-3 w-100">Back</a>
  <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</div>
</body>
</html>
