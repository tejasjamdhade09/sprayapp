<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Pesticides</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="p-4">
<div class="container">
  <h4>Pesticides</h4>
  <a href="/pesticide/add" class="btn btn-success mb-3">Add Pesticide</a>

  <table class="table table-bordered table-striped">
    <thead class="table-light">
      <tr>
        <th>ID</th><th>Name</th><th>Company</th>
        <th>Purchase Date</th><th>Qty</th><th>Price</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="p : ${pesticides}">
        <td th:text="${p.pesticideId}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.company}"></td>
        <td th:text="${p.purchaseDate}"></td>
        <td th:text="${p.qty} + ' ' + ${p.unit}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.notes}"></td>
      </tr>
    </tbody>
  </table>

  <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</div>
</body>
</html>
