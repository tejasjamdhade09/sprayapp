<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container mt-4">
    <h3 class="text-center mb-4">Admin Dashboard</h3>

    <div class="text-end mb-3">
        <a href="/dashboard" class="btn btn-secondary btn-sm">← Back to Dashboard</a>
        <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Registered Users</h5>
        </div>

        <div class="card-body">
            <table class="table table-striped align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Full Name</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Mobile</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="user, iterStat : ${users}">
                        <td th:text="${iterStat.index + 1}"></td>
                        <td th:text="${user.fullname}"></td>
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.mobile}"></td>
                        <td>
                            <span th:text="${user.role}" 
                                  th:classappend="${user.role == 'ADMIN'} ? 'badge bg-danger' : 'badge bg-success'">
                            </span>
                        </td>
                        <td>
                            <div class="btn-group">
                                <form th:action="@{/admin/changeRole}" method="post" class="d-inline">
                                    <input type="hidden" name="id" th:value="${user.id}">
                                    <input type="hidden" name="newRole" 
                                           th:value="${user.role == 'ADMIN'} ? 'USER' : 'ADMIN'">
                                    <button type="submit" 
                                            th:text="${user.role == 'ADMIN'} ? 'Make USER' : 'Make ADMIN'"
                                            class="btn btn-sm btn-warning"></button>
                                </form>

                                <form th:action="@{/admin/deleteUser}" method="post" class="d-inline ms-2">
                                    <input type="hidden" name="id" th:value="${user.id}">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Are you sure you want to delete this user?')">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(users)}" class="text-center text-muted">
                <p>No users found.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
