<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>User Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
  <h4 class="text-center mb-4">User Registration</h4>

  <form th:action="@{/register}" th:object="${user}" method="post">
    <div class="mb-3">
      <label>Full Name</label>
      <input type="text" th:field="*{fullname}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label>Username</label>
      <input type="text" th:field="*{username}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label>Email</label>
      <input type="email" th:field="*{email}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label>Mobile Number</label>
      <input type="text" th:field="*{mobile}" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label>Address</label>
      <textarea th:field="*{address}" class="form-control" rows="2"></textarea>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" th:field="*{password}" class="form-control" required/>
    </div>

    <button type="submit" class="btn btn-success w-100">Register</button>
  </form>

  <div class="text-center mt-3">
    <a href="/login">Already registered? Login here</a>
  </div>
</div>
</body>
</html>
