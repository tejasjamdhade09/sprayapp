<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Spray Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="p-4">
<div class="container">
  <h4>All Spray Records</h4>
  <a href="/spray/add" class="btn btn-success mb-3">Add Spray Record</a>

  <table class="table table-bordered table-striped">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Plot</th>
        <th>Crop</th>
        <th>Spray Date</th>
        <th>Water (L)</th>
        <th>Pesticides Used</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="s : ${sprays}">
        <td th:text="${s.id}"></td>
        <td th:text="${s.plot.name}"></td>
        <td th:text="${s.plot.crop.name}"></td>
        <td th:text="${s.sprayDate}"></td>
        <td th:text="${s.waterUsed}"></td>
        <td>
          <ul>
            <li th:each="sp : ${s.pesticideUses}"
                th:text="${sp.pesticide.name + ' - ' + sp.sprayedQty + ' ' + sp.pesticide.unit}"></li>
          </ul>
        </td>
      </tr>
    </tbody>
  </table>

   <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</div>
</body>
</html>
