<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Spray Record</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script>
    function addRow() {
      const container = document.getElementById("pesticideContainer");
      const row = document.querySelector(".pesticide-row").cloneNode(true);
      row.querySelectorAll("input, select").forEach(e => e.value = "");
      container.appendChild(row);
    }
  </script>
</head>
<body class="p-4">
<div class="container">
  <h4>Add Spray Record</h4>

  <form th:action="@{/spray/add}" method="post">
    <div class="mb-3">
      <label>Plot</label>
      <select name="plotId" class="form-select" required>
        <option value="">Select Plot</option>
        <option th:each="p : ${plots}" th:value="${p.plotId}"
                th:text="${p.name + ' (' + p.crop.name + ')'}"></option>
      </select>
    </div>

    <div class="mb-3">
      <label>Spray Date</label>
      <input type="date" name="sprayDate" class="form-control" required/>
    </div>

    <div class="mb-3">
      <label>Water Used (liters)</label>
      <input type="number" name="water" class="form-control" required/>
    </div>

    <h5>Pesticides Used</h5>
    <div id="pesticideContainer">
      <div class="row g-2 pesticide-row">
        <div class="col-md-6">
          <select name="pesticideIds" class="form-select" required>
            <option value="">Select Pesticide</option>
            <option th:each="pst : ${pesticides}" th:value="${pst.pesticideId}"
                    th:text="${pst.name + ' (' + pst.qty + ' ' + pst.unit + ')'}"></option>
          </select>
        </div>
        <div class="col-md-4">
          <input type="number" name="sprayQty" class="form-control" placeholder="Qty used" required/>
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-outline-secondary mt-2" onclick="addRow()">+ Add Another</button>

    <div class="mt-3">
      <button class="btn btn-success">Save Spray</button>
      <a href="/spray/list" class="btn btn-secondary">Cancel</a>
	  
    </div>
  </form>
  <a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
</div>
</body>
</html>
