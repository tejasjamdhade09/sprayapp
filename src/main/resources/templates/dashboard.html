<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Farm Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="p-4">
<div class="container">
  <h3 class="text-center mb-4">Farm Dashboard</h3>

  <h4>Welcome, <span th:text="${username}"></span>!</h4>
  <p>Your role: <b th:text="${role}"></b></p>

  <div class="row mt-3">
    <div class="col-md-2 mb-3"><a href="/crop/list" class="btn btn-success w-100">Crops</a></div>
    <div class="col-md-2 mb-3"><a href="/plot/list" class="btn btn-primary w-100">Plots</a></div>
    <div class="col-md-2 mb-3"><a href="/pesticide/list" class="btn btn-warning w-100">Pesticides</a></div>
    <div class="col-md-2 mb-3"><a href="/spray/list" class="btn btn-info w-100">Spray Records</a></div>
    <div class="col-md-2 mb-3"><a href="/stock" class="btn btn-secondary w-100">Stock</a></div>
    <div class="col-md-2 mb-3"><a href="/logout" class="btn btn-outline-danger w-100">Logout</a></div>
  </div>

    <img src="images/close-ripe-purple-grapes-hanging-600nw-2486860775.webp"
         class="img-fluid rounded shadow"/>
  </div>
  <div class="text-center mb-4" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
      <a href="/admin/users" class="btn btn-dark">Admin Panel</a>
  </div>

  <div class="text-end mt-4">
    
  </div>
</div>
</body>
</html>
