<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Plot List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body class="container mt-5">

  <div class="card shadow-lg p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="text-primary">All Plots</h2>
      <a href="/plot/add" class="btn btn-success">+ Add New Plot</a>
    </div>

    <table class="table table-bordered table-striped align-middle">
      <thead class="table-dark text-center">
        <tr>
          <th>ID</th>
          <th>Plot Name</th>
          <th>Crop Name</th>
          <th>Pre-Cutting Date</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="plot : ${plots}">
          <td th:text="${plot.plotId}" class="text-center"></td>
          <td th:text="${plot.name}"></td>
          <td th:text="${plot.crop != null ? plot.crop.name : '—'}"></td>
          <td th:text="${plot.precuttingDate != null ? plot.precuttingDate : '—'}" class="text-center"></td>
          <td th:text="${plot.notes}"></td>
          <td class="text-center">
            <a th:href="@{'/plot/edit/' + ${plot.plotId}}" class="btn btn-primary btn-sm me-2">Edit</a>
            <a th:href="@{'/plot/delete/' + ${plot.plotId}}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this plot?');">
               Delete
            </a>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="mt-3">
      <a href="/crop/list" class="btn btn-secondary">Back to Crop List</a>
	 
    </div>
	<a href="/dashboard" class="btn btn-secondary mt-3">Go To Dashboard</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
